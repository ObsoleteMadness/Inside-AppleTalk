title: AppleTalk Documentation
description: >-
  Community-maintained AppleTalk protocol documentation, converted from
  original Apple technical documents.
baseurl: "/Inside-AppleTalk"
url: "https://obsoletemadness.github.io"

theme: just-the-docs

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: false

# Just the Docs settings
search_enabled: true
heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/ObsoleteMadness/Inside-AppleTalk"
aux_links_new_tab: true

# Edit on GitHub (via jekyll-github-metadata)
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/ObsoleteMadness/Inside-AppleTalk"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

nav_external_links:
  - title: Contributing
    url: /Inside-AppleTalk/contributing/

plugins:
  - jekyll-github-metadata
  - jekyll-seo-tag
  - jekyll-sitemap

mermaid:
  version: "11.13.0"

math:
  engine: katex

# Build settings
exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gemspec"
  - vendor/
  - content/
  - public/
  - hugo.toml
  - themes/
  - resources/
  - migrate.ps1
  - README.md
